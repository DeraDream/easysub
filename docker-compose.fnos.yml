# fnOS / 本地测试专用：只跑 app 一个容器，连接你【已有的 MySQL】
# 用法：  docker compose -f docker-compose.fnos.yml up -d --build
# 访问：  http://<飞牛NAS的IP>:8842  → 首次进入会出现「数据库安装向导」
#
# 在向导里填你现有 MySQL 的连接信息：
#   主机 host = 你的 MySQL 地址（如 NAS 局域网 IP 192.168.x.x）
#   端口 port = 3306（按实际）
#   用户 / 密码 / 数据库 = 你已有库的账号
services:
  app:
    build: .
    container_name: baohao-app
    restart: unless-stopped
    environment:
      JWT_SECRET: please-change-this-random-secret
      TZ: Asia/Shanghai
      # Telegram 测试时填你的 Bot Token（没有也能先跑起来）
      TELEGRAM_BOT_TOKEN: ""
      EXCHANGE_API_BASE: USD
      EXCHANGE_API_URL: https://open.er-api.com/v6/latest/
      REMINDER_SCAN_TIME: "09:00"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      ADMIN_EMAIL: admin@example.com
    volumes:
      - ./data:/app/data        # 数据库连接配置 + 上传图标持久化
    ports:
      - "8842:8000"             # 左边是 NAS 对外端口，可自行修改
