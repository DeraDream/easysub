# 一键部署：直接拉取已发布的镜像运行（无需构建、无需源码）
#
#   docker compose -f docker-compose.hub.yml up -d
#
# 默认包含 MySQL 服务，应用会自动初始化数据库；首次打开 Web 后可直接登录。
# NAS（群晖/威联通/飞牛/Unraid 等）图形界面也可直接粘贴本文件内容创建项目。
services:
  app:
    # 国内拉取慢可改用 GHCR：ghcr.io/deradream/easysub:latest
    image: yforward71/easysub:latest
    container_name: easysub
    restart: unless-stopped
    environment:
      JWT_SECRET: please-change-this-to-a-random-secret   # 务必改成随机串：openssl rand -hex 32
      TZ: Asia/Shanghai
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123          # 首次初始化后请在网页里改密码
      ADMIN_EMAIL: admin@example.com
      EASYSUB_DB_HOST: db
      EASYSUB_DB_PORT: 3306
      EASYSUB_DB_USER: easysub
      EASYSUB_DB_PASSWORD: please-change-this-db-password
      EASYSUB_DB_NAME: easysub
      REMINDER_SCAN_TIME: "09:00"       # 每天扫描到期订阅、发送提醒的时间
      EXCHANGE_API_BASE: USD
      EXCHANGE_API_URL: https://open.er-api.com/v6/latest/
      TELEGRAM_BOT_TOKEN: ""            # 可留空，后续在网页「设置」里配置
    volumes:
      - easysub_data:/app/data          # 持久化：数据库连接配置 + 上传的图标
    ports:
      - "8842:8000"                     # 浏览器访问 http://<服务器IP>:8842
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    container_name: easysub-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: easysub
      MYSQL_USER: easysub
      MYSQL_PASSWORD: please-change-this-db-password
      MYSQL_ROOT_PASSWORD: please-change-this-root-password
      TZ: Asia/Shanghai
    volumes:
      - easysub_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ueasysub -pplease-change-this-db-password --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  easysub_data:
  easysub_mysql:
