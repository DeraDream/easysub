version: "3.9"

# docker-compose.panel.yml
# 适用于 Docker Desktop / Portainer / 管理面板的导入文件。
# 使用本地仓库源码构建镜像，避免运行时依赖文件找不到的问题。
# 该配置不包含 MySQL，请在网页安装向导中填写你已有的 MySQL 连接信息。

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: easysub-app:latest
    container_name: easysub-app
    restart: unless-stopped
    environment:
      JWT_SECRET: please-change-this-random-secret
      TZ: Asia/Shanghai
      TELEGRAM_BOT_TOKEN: ""
      EXCHANGE_API_BASE: USD
      EXCHANGE_API_URL: https://open.er-api.com/v6/latest/
      REMINDER_SCAN_TIME: "09:00"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      ADMIN_EMAIL: admin@example.com
    volumes:
      - ./data:/app/data
    ports:
      - "8842:8000"
