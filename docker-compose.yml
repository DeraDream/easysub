# 生产部署：app + Caddy(自动 HTTPS)，连接你【已有的 MySQL】（不自带数据库）
# 数据库连接在首次访问的网页「安装向导」中填写你现有 MySQL 的地址。
services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - app_data:/app/data        # 数据库连接配置 + 上传图标持久化
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  app_data:
  caddy_data:
  caddy_config:
